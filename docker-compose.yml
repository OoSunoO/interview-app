services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - interview_data:/app

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    environment:
      - API_PROXY=http://backend:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend

volumes:
  interview_data:
