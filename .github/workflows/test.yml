name: CI

on:
  push:
    branches: [main, ai/main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  # ── Backend tests ──────────────────────────────────────────
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
      - run: uv venv
      - run: uv pip install pytest fastapi aiosqlite pydantic httpx
      - run: uv run python -m pytest tests/ -v

  # ── Frontend checks ────────────────────────────────────────
  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run format:check
      - run: npm run check
      - run: npm test

  # ── Data validation ────────────────────────────────────────
  data-validation:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
      - run: uv venv
      - run: uv pip install pytest
      - run: uv run python scripts/validate_data.py
