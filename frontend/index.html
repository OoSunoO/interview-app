<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#1e293b" />
  <link rel="manifest" href="/manifest.json" />
  <link rel="icon" href="/icon.svg" />
  <link rel="apple-touch-icon" href="/icon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <title>面试题练习</title>
  <style>
    .app-loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      background: #050505;
      color: #8a8a9a;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      gap: 16px;
      transition: opacity 0.3s;
    }
    .app-loading.hidden {
      opacity: 0;
      pointer-events: none;
    }
    .app-loading-spinner {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.06);
      border-top-color: #6c8cff;
      animation: app-spin 0.8s linear infinite;
    }
    @keyframes app-spin {
      to { transform: rotate(360deg); }
    }
    .app-loading-text {
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.3px;
    }
    @media (prefers-color-scheme: light) {
      .app-loading { background: #f2f3f7; color: #6b6b7a; }
      .app-loading-spinner { border-color: rgba(0,0,0,0.06); border-top-color: #5570e0; }
    }
  </style>
</head>
<body>
  <div id="app">
    <div class="app-loading" id="app-loading">
      <div class="app-loading-spinner"></div>
      <div class="app-loading-text">加载题库…</div>
    </div>
  </div>
  <script type="module" src="/src/main.js"></script>
  <script>
    // Show error in loading spinner
    function showLoadError(msg) {
      var el = document.getElementById("app-loading");
      if (!el) return;
      var text = el.querySelector(".app-loading-text");
      if (text) text.textContent = msg;
      var spinner = el.querySelector(".app-loading-spinner");
      if (spinner) spinner.style.animationPlayState = "paused";
    }

    // Hide loading indicator once Svelte mounts (app replaces #app content)
    var observer = new MutationObserver(function() {
      var el = document.getElementById("app-loading");
      if (el && !document.getElementById("app")?.contains(el)) {
        el.classList.add("hidden");
        observer.disconnect();
      }
    });
    observer.observe(document.getElementById("app"), { childList: true, subtree: true });

    // Safety net: if app fails to mount within 15s, show error
    setTimeout(function() {
      var el = document.getElementById("app-loading");
      if (el && !el.classList.contains("hidden")) {
        showLoadError("加载超时，请刷新页面");
      }
    }, 15000);

    // Catch JS module loading failures (404 on stale chunks, network errors)
    window.addEventListener("error", function(e) {
      if (e.message && e.message.indexOf("Failed to fetch") > -1) {
        showLoadError("资源加载失败，请刷新页面重试");
      }
    });
    window.addEventListener("unhandledrejection", function(e) {
      showLoadError("加载失败，请刷新页面");
    });
  </script>
</body>
</html>
